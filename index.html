const authReady = firebase.auth().signInAnonymously()

  .catch((e) => {
    console.warn('Anonymous auth ไม่สำเร็จ:', e.code, e.message);

// ===== SHIM: Firebase Realtime Database =====
window.dataSdk = {
  _handler: null,
  _students: [],
  _transactions: [],
  _emit() {
    if (this._handler && this._handler.onDataChanged) {
      this._handler.onDataChanged([...this._students, ...this._transactions]);
    }
  },
  async init(handler) {
    this._handler = handler;
    await authReady;
    database.ref('students').on('value', (snap) => {
      const arr = [];
      snap.forEach((c) => arr.push({ ...c.val(), __backendId: c.key }));
      this._students = arr;
      this._emit();
    }, (err) => {
      console.error('อ่านข้อมูล students ไม่ได้:', err.code, err.message);
      showToast('อ่านข้อมูลนักเรียนไม่ได้ ตรวจสอบ Firebase Rules', 'error');
    });
    database.ref('transactions').on('value', (snap) => {
      const arr = [];
      snap.forEach((c) => arr.push({ ...c.val(), __backendId: c.key }));
      this._transactions = arr;
      this._emit();
    }, (err) => {
      console.error('อ่านข้อมูล transactions ไม่ได้:', err.code, err.message);
    });
    return { isOk: true };
  },
  async create(record) {
    try {
      const path = record.type === 'transaction' ? 'transactions' : 'students';
      const ref = await database.ref(path).push(record);
      return { isOk: true, id: ref.key };
    } catch (e) {
      console.error('dataSdk.create error:', e);
      return { isOk: false, error: e };
    }
  },
  async remove(backendId, type) {
    try {
      const path = type === 'transaction' ? 'transactions' : 'students';
      await database.ref(path + '/' + backendId).remove();
      return { isOk: true };
    } catch (e) {
      console.error('dataSdk.remove error:', e);
      return { isOk: false, error: e };
    }
  }
};

// ===== SHIM: element_sdk =====
window.elementSdk = {
  config: {},
  _onChange: null,
  init(opts) {
    this.config = { ...(opts.defaultConfig || {}) };
    this._onChange = opts.onConfigChange || null;
    authReady.then(() => {
      database.ref('config').on('value', (snap) => {
        const val = snap.val() || {};
        this.config = { ...(opts.defaultConfig || {}), ...val };
        if (this._onChange) this._onChange(this.config);
      }, (err) => console.error('อ่าน config ไม่ได้:', err.code, err.message));
    });
  },
  setConfig(partial) {
    this.config = { ...this.config, ...partial };
    database.ref('config').update(partial).catch((e) => console.error('setConfig error:', e));
  }
};

let teachers = [];
let transactions = [];

let sampleTransactions = [];
let teacherUsers = [];
let usersLoaded = false;
let customClasses = [];     // ชื่อชั้นที่สร้างเอง
let customClassObjs = [];   // { name, __backendId }

const SESSION_KEY = 'savings_app_session';

const defaultUsers = {
  admin: { password: '25422542', role: 'admin', name: 'ผู้ดูแลระบบ', class: 'all' },
  teacher1: { password: '1234', role: 'teacher', name: 'ครูชนณรงค์', class: 'ป.1/1' },
  teacher2: { password: '1234', role: 'teacher', name: 'ครูสมหญิง', class: 'ป.2/1' },

function applyConfig(config) {
  document.getElementById('headerSchoolName').textContent = config.school_name || defaultConfig.school_name;
  document.getElementById('headerYear').textContent = 'ปีการศึกษา ' + (config.academic_year || defaultConfig.academic_year);
  document.getElementById('loginYearText').textContent = 'ปีการศึกษา ' + (config.academic_year || defaultConfig.academic_year);
  document.body.style.backgroundColor = config.background_color || defaultConfig.background_color;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => { applyConfig(config); },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_color || defaultConfig.primary_color, set: (v) => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
      { get: () => config.secondary_color || defaultConfig.secondary_color, set: (v) => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } }
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }

  mapToEditPanelValues: (config) => new Map([

    ['academic_year', config.academic_year || defaultConfig.academic_year]

});

// ===== DATA HANDLER =====
const dataHandler = {
  onDataChanged(data) {
    allRecords = data;
    students = data.filter(r => r.type === 'student').map(r => ({
      id: r.student_id,
      number: r.student_number,
      prefix: r.student_prefix,
      name: r.student_name,
      class: r.student_class,
      idCard: r.student_id_card,
      balance: r.balance || 0,
      __backendId: r.__backendId
    }));

    transactions = data.filter(r => r.type === 'transaction').map(r => ({
      studentId: r.student_id,
      type: r.transaction_type,
      amount: r.amount,
      date: r.date,
      by: r.recorded_by,
      balance: r.balance,
      __backendId: r.__backendId
    }));

    sampleStudents = students.length > 0 ? students : [
      { id: 'STD001', number: '1', prefix: 'ด.ช.', name: 'สมชาย ใจดี', class: 'ป.1/1', idCard: '1100100100001', balance: 150 },
      { id: 'STD002', number: '2', prefix: 'ด.ญ.', name: 'สมหญิง รักเรียน', class: 'ป.1/1', idCard: '1100100100002', balance: 320 },
      { id: 'STD003', number: '3', prefix: 'ด.ช.', name: 'วิชัย มานะ', class: 'ป.2/1', idCard: '1100100100003', balance: 500 },
      { id: 'STD004', number: '4', prefix: 'ด.ญ.', name: 'มาลี สดใส', class: 'ป.2/1', idCard: '1100100100004', balance: 80 },
      { id: 'STD005', number: '5', prefix: 'ด.ช.', name: 'ประเสริฐ ขยัน', class: 'ม.1/1', idCard: '1100100100005', balance: 1200 },
    ];

    sampleTransactions = transactions.length > 0 ? transactions : [
      { studentId: 'STD001', type: 'deposit', amount: 100, date: '2024-12-01T08:30:00', by: 'teacher1', balance: 100 },
      { studentId: 'STD001', type: 'deposit', amount: 50, date: '2024-12-02T08:30:00', by: 'teacher1', balance: 150 },
      { studentId: 'STD002', type: 'deposit', amount: 200, date: '2024-12-01T08:35:00', by: 'teacher1', balance: 200 },
      { studentId: 'STD002', type: 'deposit', amount: 150, date: '2024-12-03T08:35:00', by: 'teacher1', balance: 350 },
      { studentId: 'STD002', type: 'withdraw', amount: 30, date: '2024-12-04T09:00:00', by: 'teacher1', balance: 320 },
      { studentId: 'STD003', type: 'deposit', amount: 500, date: '2024-12-02T08:40:00', by: 'teacher2', balance: 500 },
      { studentId: 'STD005', type: 'deposit', amount: 1200, date: '2024-12-01T08:45:00', by: 'teacher1', balance: 1200 },
    ];

    if (transactions.length > 0) {
      sampleStudents.forEach(s => {
        const studentTxns = transactions.filter(t => t.studentId === s.id);
        if (studentTxns.length > 0) {
          const sorted = studentTxns.sort((a, b) => new Date(b.date) - new Date(a.date));
          s.balance = sorted[0].balance;
        }
      });
    }
    if (!currentUser) return;
    if (currentPage === 'dashboard') renderDashboard();
    if (currentPage === 'transaction') {
      if (txnSelectedStudent) {
        const refreshed = sampleStudents.find(s => s.id === txnSelectedStudent.id);
        if (refreshed) {
          txnSelectedStudent = refreshed;
          const card = document.getElementById('selectedStudentCard');
          if (card) {
            card.innerHTML = `
              <div class="flex items-center justify-between">
                <div>
                  <p class="font-semibold">${refreshed.prefix}${refreshed.name}</p>
                  <p class="text-xs text-ios-gray">${refreshed.class} | รหัส: ${refreshed.id}</p>
                </div>
                <div class="text-right">
                  <p class="text-xs text-ios-gray">ยอดคงเหลือ</p>
                  <p class="text-lg font-bold text-ios-blue">฿${refreshed.balance.toLocaleString()}</p>
                </div>
              </div>`;
          }

      } else {
        renderTransaction();
      }

    if (currentPage === 'accounts') renderAccounts();
    if (currentPage === 'manage') renderManage();
    if (currentPage === 'ranking') renderRanking();
    if (currentPage === 'passbook' && pbCurrentStudentId) {
      generatePassbook(pbCurrentStudentId);
    }
  }
};

(async () => {
  const result = await window.dataSdk.init(dataHandler);
  if (!result.isOk) console.error('Data SDK init failed');

// ===== USERS + CLASSES (Firebase) =====
authReady.then(() => {
  database.ref('users').on('value', (snap) => {
    const arr = [];
    console.log('[users] จำนวน children =', snap.numChildren());
    snap.forEach((c) => {
      const v = c.val();
      if (v && typeof v === 'object' && v.username) {
        arr.push({ ...v, __backendId: c.key });

        console.warn('[users] ข้ามเรคคอร์ดไม่มี username key:', c.key, v);

    });
    console.log('[users] อ่านครูได้', arr.length, 'คน:', arr.map(u => u.username));

    if (currentUser && currentPage === 'manage') renderManage();

  }, (err) => {

  });

  database.ref('classes').on('value', (snap) => {
    const arr = [];
    snap.forEach((c) => { const v = c.val(); if (v && v.name) arr.push({ name: v.name, __backendId: c.key }); });
    customClassObjs = arr;
    customClasses = arr.map(o => o.name);
    if (currentUser && currentPage === 'manage') renderManage();
  }, (err) => {
    console.error('อ่านข้อมูล classes ไม่ได้:', err.code, err.message);
  });
});


function getAllUsers() {
  const merged = { ...defaultUsers };
  teacherUsers.forEach(u => {
    if (!u.username) return;
    merged[u.username] = {
      password: u.password,
      role: u.role || 'teacher',
      name: u.name,
      class: u.class,
      __backendId: u.__backendId
    };
  });
  return merged;
}

function getAllClasses() {
  const fromStudents = sampleStudents.map(s => s.class).filter(Boolean);
  return [...new Set([...fromStudents, ...customClasses])].sort();
}

// ===== SESSION =====
function saveSession(username) {
  try { localStorage.setItem(SESSION_KEY, username); } catch (e) {}
}

function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
}

function enterApp(username, userData) {
  currentUser = { username, ...userData };
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('currentUserDisplay').textContent = currentUser.name + ' (' + getRoleName(currentUser.role) + ')';
  renderNav();
  navigateTo('dashboard');
}

function restoreSession() {
  if (currentUser) return;
  let saved = null;
  try { saved = localStorage.getItem(SESSION_KEY); } catch (e) {}
  if (!saved) return;
  const allUsers = getAllUsers();
  if (allUsers[saved]) {
    enterApp(saved, allUsers[saved]);
  }
}

// ===== AUTH =====
function handleLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();

  const allUsers = getAllUsers();
  if (allUsers[user] && allUsers[user].password === pass) {
    saveSession(user);
    enterApp(user, allUsers[user]);
    document.getElementById('loginError').classList.add('hidden');
  } else {
    document.getElementById('loginError').classList.remove('hidden');
  }
}

function handleLogout() {
  if (typeof stopScanner === 'function') stopScanner();
  clearSession();
  currentUser = null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').classList.add('hidden');
}

function getRoleName(role) {
  return { admin: 'แอดมิน', teacher: 'ครูประจำชั้น', student: 'นักเรียน' }[role] || role;
}

      { id: 'passbook', icon: 'book-open', label: 'สมุดบัญชี' }

}

function navigateTo(page) {
  if (typeof stopScanner === 'function') stopScanner();
  currentPage = page;
  renderNav();
  const content = document.getElementById('mainContent');
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'transaction': renderTransaction(); break;
    case 'accounts': renderAccounts(); break;
    case 'manage': renderManage(); break;
    case 'ranking': renderRanking(); break;
    case 'cards': renderCards(); break;
    case 'passbook': renderPassbook(); break;
  }
}

// ===== TOAST =====
function showToast(msg, type = 'success') {
  const colors = { success: '#34C759', error: '#FF3B30', info: '#007AFF' };
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.background = colors[type];
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ===== QR SCANNER =====
let qrScanner = null;

async function startScanner() {
  const readerEl = document.getElementById('qrReader');
  if (!readerEl) return;
  if (qrScanner) { showToast('กล้องเปิดอยู่แล้ว', 'info'); return; }
  if (typeof Html5Qrcode === 'undefined') { showToast('ไลบรารีสแกนยังไม่โหลด', 'error'); return; }

  readerEl.classList.remove('hidden');
  qrScanner = new Html5Qrcode('qrReader');
  const cfg = { fps: 10, qrbox: 220 };

  try {
    await qrScanner.start({ facingMode: { exact: 'environment' } }, cfg, onScanSuccess, () => {});
  } catch (e) {
    try {
      await qrScanner.start({ facingMode: 'environment' }, cfg, onScanSuccess, () => {});
    } catch (e2) {
      qrScanner = null;
      readerEl.classList.add('hidden');
      showToast('เปิดกล้องไม่ได้ ต้องอนุญาตสิทธิ์กล้อง', 'error');
    }
  }
}

async function stopScanner() {
  const readerEl = document.getElementById('qrReader');
  if (qrScanner) {
    try { await qrScanner.stop(); qrScanner.clear(); } catch (e) {}
    qrScanner = null;
  }
  if (readerEl) readerEl.classList.add('hidden');
}

function onScanSuccess(decodedText) {
  const id = (decodedText || '').trim();
  const student = sampleStudents.find(s => s.id === id);
  stopScanner();
  if (student) {
    if (currentUser.role === 'teacher' && student.class !== currentUser.class) {
      showToast('นักเรียนคนนี้ไม่ได้อยู่ห้องของคุณ', 'error');
      return;
    }
    selectStudent(id);
    showToast('พบนักเรียน: ' + student.prefix + student.name, 'success');
  } else {
    showToast('ไม่พบนักเรียนรหัส ' + id, 'error');
  }
}

function searchStudent(query) {
  const results = document.getElementById('searchResults');
  if (!query || query.length < 1) { results.innerHTML = ''; return; }
  const filtered = sampleStudents.filter(s =>
    s.id.toLowerCase().includes(query.toLowerCase()) ||
    s.name.includes(query) ||
    (s.prefix + s.name).includes(query)
  );

  if (currentUser.role === 'teacher') {
    const classFiltered = filtered.filter(s => s.class === currentUser.class);
    results.innerHTML = classFiltered.map(s => `
      <div class="flex items-center justify-between p-3 rounded-lg hover:bg-ios-lightgray cursor-pointer border-b border-ios-separator" onclick="selectStudent('${s.id}')">
        <div><span class="font-medium">${s.prefix}${s.name}</span> <span class="text-xs text-ios-gray">${s.class}</span></div>
        <span class="text-sm text-ios-blue">${s.id}</span>
      </div>
    `).join('') || '<p class="text-sm text-ios-gray p-2">ไม่พบนักเรียน</p>';
  } else {
    results.innerHTML = filtered.map(s => `
      <div class="flex items-center justify-between p-3 rounded-lg hover:bg-ios-lightgray cursor-pointer border-b border-ios-separator" onclick="selectStudent('${s.id}')">
        <div><span class="font-medium">${s.prefix}${s.name}</span> <span class="text-xs text-ios-gray">${s.class}</span></div>
        <span class="text-sm text-ios-blue">${s.id}</span>
      </div>
    `).join('') || '<p class="text-sm text-ios-gray p-2">ไม่พบนักเรียน</p>';
  }
}

function selectStudent(id) {
  txnSelectedStudent = sampleStudents.find(s => s.id === id);
  if (!txnSelectedStudent) return;
  document.getElementById('txnForm').classList.remove('hidden');
  document.getElementById('selectedStudentCard').innerHTML = `
    <div class="flex items-center justify-between">
      <div>
        <p class="font-semibold">${txnSelectedStudent.prefix}${txnSelectedStudent.name}</p>

      </div>
      <div class="text-right">
        <p class="text-xs text-ios-gray">ยอดคงเหลือ</p>
        <p class="text-lg font-bold text-ios-blue">฿${txnSelectedStudent.balance.toLocaleString()}</p>
      </div>
    </div>
  `;
  document.getElementById('searchResults').innerHTML = '';
  const searchInput = document.getElementById('studentSearch');
  if (searchInput) searchInput.value = '';

function setTxnType(type) {

}

function updateTxnTypeUI() {
  const dep = document.getElementById('btnDeposit');
  const wth = document.getElementById('btnWithdraw');
  if (!dep || !wth) return;
  if (txnType === 'deposit') {
    dep.className = 'ios-btn py-3 bg-ios-green text-white font-semibold';
    wth.className = 'ios-btn py-3 bg-white text-ios-red border-2 border-ios-red font-semibold';

  }
}

function setAmount(amt) {
  txnAmount = amt;
  document.getElementById('customAmount').value = amt;
  updateAmountBtns();
}

function updateAmountBtns() {
  document.querySelectorAll('.amount-btn').forEach(btn => {
    const val = parseInt(btn.textContent.replace('฿', ''));
    btn.classList.toggle('selected', val === txnAmount);
  });
}

async function saveTransaction() {
  if (!txnSelectedStudent || txnAmount <= 0) {
    showToast('กรุณาเลือกนักเรียนและจำนวนเงิน', 'error');
    return;
  }
  if (txnType === 'withdraw' && txnAmount > txnSelectedStudent.balance) {
    showToast('ยอดเงินไม่เพียงพอ', 'error');
    return;
  }

  const btn = document.getElementById('saveTxnBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  const newBalance = txnType === 'deposit' ? txnSelectedStudent.balance + txnAmount : txnSelectedStudent.balance - txnAmount;

  const result = await window.dataSdk.create({
    type: 'transaction',
    student_id: txnSelectedStudent.id,
    student_name: txnSelectedStudent.prefix + txnSelectedStudent.name,
    student_prefix: txnSelectedStudent.prefix,
    student_class: txnSelectedStudent.class,
    student_number: txnSelectedStudent.number,
    student_id_card: '',
    transaction_type: txnType,
    amount: txnAmount,
    balance: newBalance,
    date: new Date().toISOString(),
    recorded_by: currentUser.username,
    note: ''
  });

  btn.disabled = false;
  btn.textContent = 'บันทึกรายการ';

  if (result.isOk) {
    txnSelectedStudent.balance = newBalance;
    showToast(`${txnType === 'deposit' ? 'ฝาก' : 'ถอน'} ฿${txnAmount} สำเร็จ`, 'success');
    txnAmount = 0;
    document.getElementById('customAmount').value = '';
    updateAmountBtns();
    selectStudent(txnSelectedStudent.id);
  } else {
    showToast('เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
  }
}

async function deleteClassStudents() {
  const cls = document.getElementById('deleteClassSelect').value;
  if (!cls) { showToast('กรุณาเลือกห้องที่จะลบ', 'error'); return; }
  const inClass = sampleStudents.filter(s => s.class === cls);
  if (inClass.length === 0) { showToast('ห้องนี้ไม่มีนักเรียน', 'error'); return; }
  if (!confirm(`ยืนยันลบนักเรียนทั้งห้อง ${cls} จำนวน ${inClass.length} คน?\nการลบไม่สามารถย้อนกลับได้`)) return;
  let count = 0;
  for (const s of inClass) { if (await removeStudentById(s.id)) count++; }
  showToast(`ลบห้อง ${cls} สำเร็จ ${count} คน`, 'success');
}

async function saveNewStudent() {
  const id = document.getElementById('newStudentId').value.trim();
  const number = document.getElementById('newStudentNumber').value.trim();
  const prefix = document.getElementById('newStudentPrefix').value;
  const name = document.getElementById('newStudentName').value.trim();
  const classVal = document.getElementById('newStudentClass').value;
  const newClassName = document.getElementById('newClassName').value.trim();
  const idCard = document.getElementById('newStudentIdCard').value.trim();

  const finalClass = classVal === 'new' ? newClassName : classVal;

  if (!id || !number || !name || !finalClass) {
    showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
    return;
  }

  if (sampleStudents.find(s => s.id === id)) {
    showToast('รหัสนักเรียนนี้มีอยู่แล้ว', 'error');
    return;
  }

  const btn = document.querySelector('#studentModal button:last-child');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  const result = await window.dataSdk.create({
    type: 'student',
    student_id: id,
    student_number: number,
    student_prefix: prefix,
    student_name: name,
    student_class: finalClass,
    student_id_card: idCard,
    balance: 0,
    transaction_type: '',
    amount: 0,
    date: new Date().toISOString(),
    recorded_by: currentUser.username,
    note: ''
  });

  btn.disabled = false;
  btn.textContent = originalText;

  if (result.isOk) {
    document.getElementById('studentModal').remove();
    showToast('เพิ่มนักเรียนสำเร็จ', 'success');
  } else {
    showToast('เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
  }
}

async function saveEditStudent(studentId) {
  const student = sampleStudents.find(s => s.id === studentId);
  const newId = document.getElementById('editStudentId').value.trim();
  const newNumber = document.getElementById('editStudentNumber').value.trim();
  const newPrefix = document.getElementById('editStudentPrefix').value;
  const newName = document.getElementById('editStudentName').value.trim();
  const classVal = document.getElementById('editStudentClass').value;
  const newClassName = document.getElementById('editClassName').value.trim();
  const newIdCard = document.getElementById('editStudentIdCard').value.trim();

  const finalClass = classVal === 'new' ? newClassName : classVal;

  if (!newId || !newNumber || !newName || !finalClass) {
    showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
    return;
  }

  if (newId !== studentId && sampleStudents.find(s => s.id === newId)) {
    showToast('รหัสนักเรียนนี้มีอยู่แล้ว', 'error');
    return;
  }

  if (student.__backendId) {
    const result = await database.ref('students/' + student.__backendId).update({
      student_id: newId,
      student_number: newNumber,
      student_prefix: newPrefix,
      student_name: newName,
      student_class: finalClass,
      student_id_card: newIdCard
    }).then(() => ({ isOk: true })).catch(() => ({ isOk: false }));

    if (!result.isOk) { showToast('บันทึกไม่สำเร็จ', 'error'); return; }
    document.getElementById('editStudentModal').remove();
    showToast('บันทึกการเปลี่ยนแปลงสำเร็จ', 'success');
  } else {
    student.id = newId;
    student.number = newNumber;
    student.prefix = newPrefix;
    student.name = newName;
    student.class = finalClass;
    student.idCard = newIdCard;
    document.getElementById('editStudentModal').remove();
    showToast('บันทึก (ข้อมูลตัวอย่าง) สำเร็จ', 'success');
    renderAccounts();
  }
}

async function importCSV() {
  const csv = document.getElementById('csvInput').value.trim();
  if (!csv) { showToast('กรุณากรอกข้อมูล', 'error'); return; }

  const btn = document.querySelector('#csvModal button:last-child');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'กำลังนำเข้า...';

  const lines = csv.split('\n');
  let count = 0;

  for (const line of lines) {
    const parts = line.split(',').map(s => s.trim());
    if (parts.length >= 5) {
      const result = await window.dataSdk.create({
        type: 'student',
        student_id: parts[0],
        student_number: parts[1],
        student_prefix: parts[2],
        student_name: parts[3],
        student_class: parts[4],
        student_id_card: parts[5] || '',
        balance: 0,
        transaction_type: '',
        amount: 0,
        date: new Date().toISOString(),
        recorded_by: currentUser.username,
        note: ''
      });
      if (result.isOk) count++;
    }
  }

  btn.disabled = false;
  btn.textContent = originalText;

  document.getElementById('csvModal').remove();
  showToast(`นำเข้า ${count} รายการสำเร็จ`, 'success');
}

function downloadCSVTemplate() {
  const template = `รหัสนักเรียน,เลขที่,คำนำหน้า,ชื่อ-สกุล,ชั้น,เลขบัตรประชาชน
STD006,6,ด.ช.,สมศักดิ์ รักดี,ป.3/1,1100100100006
STD007,7,ด.ญ.,นิษฐา มีสุข,ป.3/1,1100100100007
STD008,8,ด.ช.,กิตติ ใจบริสุทธิ์,ป.4/1,1100100100008
STD009,9,ด.ญ.,พรชนม พลเมือง,ป.4/1,1100100100009
STD010,10,ด.ช.,สิรพัฒน์ เรียนดี,ป.4/1,1100100100010`;

  const blob = new Blob([template], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.setAttribute('href', url);
  link.setAttribute('download', 'template_students.csv');
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('ดาวน์โหลดเทมเพลต CSV สำเร็จ', 'success');
}

async function saveNewTeacher() {
  const username = document.getElementById('teacherUsername').value.trim();
  const password = document.getElementById('teacherPassword').value.trim();
  const name = document.getElementById('teacherName').value.trim();
  const cls = document.getElementById('teacherClass').value.trim();

  if (!username || !password || !name || !cls) {
    showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
    return;
  }
  if (getAllUsers()[username]) {
    showToast('Username นี้มีอยู่แล้ว', 'error');
    return;
  }
  const key = 'u_' + username.replace(/[.#$\[\]\/]/g, '_');
  const btn = document.querySelector('#teacherModal button:last-child');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';
  const result = await database.ref('users/' + key).set({
    username, password, name, class: cls, role: 'teacher'
  }).then(() => ({ isOk: true })).catch((e) => { console.error('เพิ่มครู error:', e); return { isOk: false }; });

  btn.disabled = false;
  btn.textContent = original;

  if (result.isOk) {
    document.getElementById('teacherModal').remove();

async function importTeacherCSV() {
  const csv = document.getElementById('teacherCsvInput').value.trim();
  if (!csv) { showToast('กรุณากรอกข้อมูล', 'error'); return; }

  const btn = document.querySelector('#teacherCsvModal button:last-child');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'กำลังนำเข้า...';

  const lines = csv.split('\n');
  let count = 0;
  let skipped = 0;
  const existing = getAllUsers();

  for (const line of lines) {
    if (!line.trim()) continue;
    const parts = line.split(',').map(s => s.trim());
    if (parts.length < 4) { skipped++; continue; }

    const [username, password, name, cls] = parts;
    if (!username || !password || !name || !cls) { skipped++; continue; }
    if (existing[username]) { skipped++; continue; }

    const key = 'u_' + username.replace(/[.#$\[\]\/]/g, '_');
    const result = await database.ref('users/' + key).set({
      username, password, name, class: cls, role: 'teacher'
    }).then(() => ({ isOk: true })).catch((e) => { console.error('นำเข้าครู error:', e); return { isOk: false }; });

    if (result.isOk) { count++; existing[username] = true; }
    else skipped++;
  }

  btn.disabled = false;
  btn.textContent = originalText;

  document.getElementById('teacherCsvModal').remove();
  showToast(`นำเข้าครู ${count} คน${skipped ? ' ข้าม ' + skipped : ''}`, count ? 'success' : 'error');
}

function downloadTeacherCSVTemplate() {
  const template = `Username,รหัสผ่าน,ชื่อ-สกุล,ชั้น
teacher3,1234,ครูสมศรี ใจงาม,ป.3/1
teacher4,1234,ครูมานพ ตั้งใจ,ป.4/1
teacher5,1234,ครูวิภา สอนดี,ป.5/1`;

  const blob = new Blob(['\ufeff' + template], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.setAttribute('href', url);
  link.setAttribute('download', 'template_teachers.csv');
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('ดาวน์โหลดเทมเพลตครู CSV สำเร็จ', 'success');
}

function renderCardQRCodes(list, attempt) {
  if (typeof QRCode === 'undefined') {
    if (attempt < 40) {
      setTimeout(() => renderCardQRCodes(list, attempt + 1), 100);
      return;
    }
    list.forEach(s => {
      const el = document.getElementById('qr-' + s.id);
      if (el) el.innerHTML = '<span style="font-size:8px;color:#999;">โหลด QR ไม่ได้</span>';
    });
    return;
  }

  list.forEach(s => {
    const el = document.getElementById('qr-' + s.id);
    if (!el) return;
    el.innerHTML = '';
    try {
      if (typeof QRCode.toCanvas === 'function') {
        const canvas = document.createElement('canvas');
        el.appendChild(canvas);
        QRCode.toCanvas(canvas, s.id, { width: 60, margin: 0 }, (err) => {
          if (err) el.innerHTML = '<span style="font-size:8px;color:#999;">QR error</span>';
        });
      } else {
        const opts = { text: s.id, width: 60, height: 60 };
        if (QRCode.CorrectLevel) opts.correctLevel = QRCode.CorrectLevel.M;
        new QRCode(el, opts);
      }
    } catch (e) {
      el.innerHTML = '<span style="font-size:8px;color:#999;">QR error</span>';
    }
  });
}

            <tr>
              <td class="p-2 border border-ios-separator text-center">${i + 1}</td>
              <td class="p-2 border border-ios-separator">${new Date(t.date).toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' })}</td>
              <td class="p-2 border border-ios-separator text-right text-ios-green">${t.type === 'deposit' ? t.amount.toLocaleString() : '-'}</td>
              <td class="p-2 border border-ios-separator text-right text-ios-red">${t.type === 'withdraw' ? t.amount.toLocaleString() : '-'}</td>
              <td class="p-2 border border-ios-separator text-right font-semibold">${t.running.toLocaleString()}</td>
            </tr>
          `).join('')}
        </tbody>
        <tfoot>
          <tr class="bg-ios-lightgray font-semibold">
            <td class="p-2 border border-ios-separator text-center" colspan="2">รวม</td>
            <td class="p-2 border border-ios-separator text-right text-ios-green">${totalDeposit.toLocaleString()}</td>
            <td class="p-2 border border-ios-separator text-right text-ios-red">${totalWithdraw.toLocaleString()}</td>
            <td class="p-2 border border-ios-separator text-right text-ios-blue">${finalBalance.toLocaleString()}</td>
          </tr>
        </tfoot>
      </table>

      <div class="flex justify-between items-end mt-8 text-sm">
        <p class="text-ios-gray">พิมพ์เมื่อ ${new Date().toLocaleDateString('th-TH')}</p>
        <div class="text-center">
          <div style="height:40px;"></div>
          <p class="border-t border-gray-400 pt-1 px-6">ลายเซ็นผู้รับรอง</p>
        </div>
      </div>
    </div>
  `;
}

  lucide.createIcons();
  applyConfig(defaultConfig);
  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  restoreSession();
});
 </script>
